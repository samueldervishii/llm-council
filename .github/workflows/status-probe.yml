name: Status Probe

# Runs every 5 minutes against the public Étude backend and writes a
# single row into the `service_checks` collection on MongoDB Atlas.
# Because this workflow runs on GitHub's infrastructure (not on Render),
# it can still record a "down" sample when the backend is asleep or dead
# — which is exactly the blind spot the in-process scheduler had.
#
# GitHub cron timing is best-effort: scheduled for every 5 min, may fire
# every 5-15 min under load. That's fine for a status page.

on:
  schedule:
    - cron: '*/5 * * * *'
  # Allow manual runs from the Actions tab for debugging
  workflow_dispatch:

# Principle of least privilege: this workflow only checks out the repo
# and POSTs to MongoDB Atlas. It writes nothing back to GitHub.
permissions:
  contents: read

# Avoid stacking runs if a previous probe is still going
concurrency:
  group: status-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymongo[srv]==4.10.1 httpx==0.28.1

      - name: Run status probe
        env:
          CORTEX_HEALTH_URL: ${{ secrets.CORTEX_HEALTH_URL }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
        run: python .github/scripts/probe.py
