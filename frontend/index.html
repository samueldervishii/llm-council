<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortex</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A clean AI chat experience powered by Claude" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cortex" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Cortex" />
    <meta property="og:description" content="A clean AI chat experience powered by Claude" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <style>
      /* Initial loader - shown until React mounts */
      body {
        margin: 0;
        background: #ffffff;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #ffffff;
        color: #b8864a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .initial-loader h1 {
        font-size: 2rem;
        font-weight: 400;
        margin-bottom: 2rem;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #ddd;
        border-top-color: #b8864a;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loader removed — React mounts fast enough that a blank flash is negligible.
           If needed in the future, add a minimal spinner here (not the full splash). -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
